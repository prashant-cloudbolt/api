name: 'Upload feature_flag.json to S3'
description: 'Creates an S3 bucket (if needed) and uploads the feature_flag.json file with versioning.'
inputs:
  environment:
    description: 'The environment to deploy the stack to.'
    required: true
  feature-flag-s3-bucket:
    description: 'The S3 bucket where the feature flag will be stored.'
    required: true
  feature-flag-file-name:
    description: 'The name of the feature flag file to upload.'
    required: true
  stack-name:
    description: 'The name of the CloudFormation stack.'
    required: true
  working-directory:
    description: 'The working directory to run the action in.'
    required: true
    default: '.'
  # aws-access-key-id:
  #   description: 'AWS Access Key ID'
  #   required: true
  # aws-secret-access-key:
  #   description: 'AWS Secret Access Key'
  #   required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2 # Fetch the last 2 commits for comparison

    # - name: Configure AWS Credentials
    #   uses: aws-actions/configure-aws-credentials@v4
    #   with:
    #     aws-access-key-id: ${{ inputs.aws-access-key-id }}
    #     aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
    #     aws-region: us-east-1

    - name: Check if S3 bucket exists
      id: check-bucket
      shell: bash
      run: |
        BUCKET_NAME=${{ inputs.feature-flag-s3-bucket }}
        echo "Checking for bucket: $BUCKET_NAME"
        if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
          echo "bucket_exists=true" >> $GITHUB_OUTPUT
        else
          echo "bucket_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Deploy S3 bucket for feature flag Template
      if: steps.check-bucket.outputs.bucket_exists == 'false'
      working-directory: ${{ inputs.working-directory }}
      shell: bash
      run: |
        aws cloudformation deploy \
          --template-file s3-feature-flag-template.yaml \
          --stack-name ${{ inputs.stack-name }} \
          --parameter-overrides \
            Environment=${{ inputs.environment }} \
            S3Bucket=${{ inputs.feature-flag-s3-bucket }}

    - name: Check if feature_flag.json has been modified
      id: check-modified
      shell: bash
      run: |
        git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}
        if git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD | grep -q ${{ inputs.feature-flag-file-name }}; then
          echo "featureflag_modified=true" >> $GITHUB_ENV
        else
          echo "featureflag_modified=false" >> $GITHUB_ENV
        fi

    - name: Output feature flag modified
      shell: bash
      run: |
        echo "Feature flag modified: ${{ env.featureflag_modified }}"

    - name: Upload new feature_flag.json to S3 with versioning
      shell: bash
      if: env.featureflag_modified == 'true'
      run: |
        aws s3 cp services/feature_flag/${{ inputs.feature-flag-file-name }} s3://${{ inputs.feature-flag-s3-bucket }}/${{ inputs.feature-flag-file-name }}