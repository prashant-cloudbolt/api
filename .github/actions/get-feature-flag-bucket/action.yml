name: Generate Feature Flag S3 Bucket Name
description: Generate a slugified S3 bucket name for feature flags based on the GitHub reference

inputs:
  ref:
    description: "The Git reference (e.g., a branch or tag) to use. If not provided, it uses the default GITHUB_REF."
    required: false
  postfix:
    description: "A postfix to append to the stack name."
    required: false

outputs:
  feature-flag-s3-bucket:
    description: "Feature flag S3 bucket name based on the GitHub ref"
    value: ${{ steps.vars.outputs.feature_flag_s3_bucket_slugified }}

runs:
  using: composite
  steps:
    - id: vars
      shell: bash -leo pipefail {0}
      env:
        HEAD_REF: ${{ github.head_ref }}
        BASE_REF: ${{ github.base_ref }}
        REF_NAME: ${{ github.ref_name }}
      run: |
        git_ref="${{ inputs.ref || github.head_ref || github.ref_name }}"
        PATTERN="(CP-[0-9]+)"

        branch_name=$(
          echo "${git_ref##*/}" |
          tr -cd 'a-zA-Z0-9-'
        )
        if [[ -z "$branch_name" ]]; then
          echo "Empty Branch Name"
          exit 1
        fi
        echo "Branch Name: '$branch_name'"

        if [[ $branch_name =~ $PATTERN ]]; then
          jira_story="${BASH_REMATCH[1]}"
          random_chars=$(head /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 10)
          feature_flag_s3_bucket="${jira_story}-feature-flag-s3-${random_chars}"
          echo "feature_flag_s3_bucket=$feature_flag_s3_bucket"
        else
          echo "No JIRA story found in the branch name"
          exit 1
        fi

        feature_flag_s3_bucket_slugified=$(
          echo "$feature_flag_s3_bucket" | 
          tr '[:upper:]' '[:lower:]' | 
          tr -s '[:space:]' '-' | 
          tr -cd '[:alnum:]-' | 
          sed -E 's/-+$//'
        )

        echo "feature_flag_s3_bucket_slugified=$feature_flag_s3_bucket_slugified" >> "$GITHUB_OUTPUT"
