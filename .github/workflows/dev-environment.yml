name: Deploy Dev Environment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy-dev:
    name: Deploy to Mira Development Environment
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Detect branches
        run: |
          echo "Source Branch: ${{ github.event.pull_request.head.ref }}"
          echo "Target Branch: ${{ github.event.pull_request.base.ref }}"
        
      - name: Get modified files
        run: |
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > modified_files.txt
          echo "Modified files:"
          cat modified_files.txt
        
      - name: Check if file.json is modified
        run: |
          if grep -q "file.json" modified_files.txt; then
            echo "file.json has been modified.";
            echo "file.json=true" >> $GITHUB_ENV
          else
            echo "file.json has NOT been modified.";
            echo "file.json=false" >> $GITHUB_ENV
          fi

      - name: Conditional step based on file.json modification
        if: env.file_json == 'true'
        run: |
          echo "Taking action because file.json is modified."

