name: Deploy Dev Environment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  deploy-dev:
    name: Deploy to Mira Development Environment
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check if feature_flag.json is modified
        id: check-modifications
        run: |
          git fetch origin main
          MODIFIED_FILES=$(git diff --name-only)
          if echo "$MODIFIED_FILES" | grep -q "^services/feature_flag/.*feature_flag.json$"; then
            echo "feature_flag_modified=true" >> $GITHUB_ENV
          else
            echo "feature_flag_modified=false" >> $GITHUB_ENV
          fi

      - name: Debug modified files
        if: env.feature_flag_modified == 'true'
        run: echo "feature_flag.json is modified in this pull request."

      - name: Skip upload
        if: env.feature_flag_modified == 'false'
        run: echo "feature_flag.json not modified. Skipping upload."

      # - name: Create S3 bucket and upload feature flag
