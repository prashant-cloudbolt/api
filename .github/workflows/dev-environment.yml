name: Deploy Dev Environment

on:
  pull_request:
    # types:
    #   - opened
    #   - reopened
    #   - synchronize
    #   - closed

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  get-stack-name:
    name: Get Stack Name
    runs-on: ubuntu-latest
    outputs:
      stack-name: ${{ steps.get-stack-name.outputs.stack-name }}
      stack-name-slugified: ${{ steps.get-stack-name.outputs.stack-name-slugified }}
      feature-flag-s3-bucket-slugified: ${{ steps.get-stack-name.outputs.feature-flag-s3-bucket-slugified }}
      truncate-stack-name: ${{ steps.truncate-stack-name.outputs.truncate-stack-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Stack Name
        id: get-stack-name
        uses: ./.github/actions/get-stack-name
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Truncate Stack Name
        id: truncate-stack-name
        run: echo "truncate-stack-name=${{ steps.get-stack-name.outputs.stack-name }}" | cut -c1-30  >> "$GITHUB_OUTPUT"

  s3-feature-flag-development:
    name: S3 Feature Flag
    runs-on: ubuntu-latest
    needs:
      - get-stack-name

    outputs:
      feature_flag_version_id: ${{ steps.s3-feature-flag.outputs.feature_flag_version_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create S3 bucket and upload feature flag
        continue-on-error: true
        id: s3-feature-flag
        if: env.file_modified == 'true'
        uses: ./.github/actions/s3-feature-flag
        with:
          environment: "Development"
          region: ${{ vars.AWS_REGION }}
          feature-flag-s3-bucket: ${{ vars.FEATURE_FLAG_S3_BUCKET }}
          feature-flag-file-name: ${{ vars.FEATURE_FLAG_FILE_NAME }}
          working-directory: "."

  build-package-deploy-development:
    # This job builds and packages the latest release of the mira-serverless
    name: Build, Package, and Deploy MIRA Serverless Latest Changes to Development
    needs:
      - get-stack-name
      - s3-feature-flag-development
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Echo Feature Flag Version
        run: |
          echo "stack-name: ${{ needs.get-stack-name.outputs.stack-name }}"
          echo "stack-name-slugified: ${{ needs.get-stack-name.outputs.stack-name-slugified }}"
          echo "feature-flag-s3-bucket-slugified: ${{ needs.get-stack-name.outputs.feature-flag-s3-bucket-slugified }}"
          echo "truncate-stack-name: ${{ needs.get-stack-name.outputs.truncate-stack-name }}"