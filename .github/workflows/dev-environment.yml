name: Deploy Dev Environment

on:
  pull_request:
    # types:
    #   - opened
    #   - reopened
    #   - synchronize
    #   - closed

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  s3-feature-flag-development:
    name: S3 Feature Flag
    runs-on: ubuntu-latest

    outputs:
      feature_flag_version_id: ${{ steps.s3-feature-flag.outputs.feature_flag_version_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get modified files and check for file.json
        run: |
          # Get the list of modified files
          modified_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})
          
          # Directly check if the specific file is in the modified files list
          if echo "$modified_files" | grep -q "services/feature_flag/staging/feature_flag.json"; then
            echo "services/feature_flag/staging/feature_flag.json has been modified."
            echo "file_modified=true" >> $GITHUB_ENV
          else
            echo "services/feature_flag/staging/feature_flag.json has NOT been modified."
            echo "file_modified=false" >> $GITHUB_ENV
          fi

      - name: Create S3 bucket and upload feature flag
        continue-on-error: true
        id: s3-feature-flag
        if: env.file_modified == 'true'
        uses: ./.github/actions/s3-feature-flag
        with:
          environment: "Development"
          region: ${{ vars.AWS_REGION }}
          feature-flag-s3-bucket: ${{ vars.FEATURE_FLAG_S3_BUCKET }}
          feature-flag-file-name: ${{ vars.FEATURE_FLAG_FILE_NAME }}
          working-directory: "."

  build-package-deploy-development:
    # This job builds and packages the latest release of the mira-serverless
    name: Build, Package, and Deploy MIRA Serverless Latest Changes to Development
    needs:
      - s3-feature-flag-development
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Echo Feature Flag Version
        run: |
          echo "Building package with feature flag version: ${{ needs.s3-feature-flag-development.outputs.feature_flag_version_id }}"