name: release-node-api-version
on:
  workflow_dispatch:
    inputs:
      distinct_id:
        description: "This input required to run the workflow from return-dispatch"

jobs:
  publish_codedeploy_dev:
    if: github.ref == 'refs/heads/multi_tenant_dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: multi_tenant_dev

      - name: Echo Branch name
        run: |
          branch_name="${GITHUB_REF#refs/heads/}"
          echo $branch_name

      - name: run codedeploy-dev workflow
        uses: codex-/return-dispatch@v1
        id: return_dispatch
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: multi_tenant_dev
          repo: workflow-target
          owner: prashant-cloudbolt
          workflow: codedeploy-dev.yml

      - name: Watch codedeploy-dev workflow
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=${{steps.return_dispatch.outputs.run_id}}
          gh run watch $RUN_ID --repo prashant-cloudbolt/workflow-target

      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${{ github.event.inputs.distinct_id }}

  publish_codedeploy_stage:
    if: github.ref == 'refs/heads/multi_tenant_stage'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          ref: multi_tenant_stage

      - name: Echo Branch name
        run: |
          branch_name="${GITHUB_REF#refs/heads/}"
          echo $branch_name

      - name: run codedeploy-dev workflow
        uses: codex-/return-dispatch@v1
        id: return_dispatch
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: multi_tenant_stage
          repo: workflow-target
          owner: prashant-cloudbolt
          workflow: codedeploy-mirastage.yml

      - name: Watch codedeploy-dev workflow
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=${{steps.return_dispatch.outputs.run_id}}
          gh run watch $RUN_ID --repo prashant-cloudbolt/workflow-target

      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${{ github.event.inputs.distinct_id }}