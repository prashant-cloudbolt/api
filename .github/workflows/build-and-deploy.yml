name: Build and Deploy

on:
  push:
    branches:
      - multi_tenant_dev
      - multi_tenant_stage

permissions:
  id-token: write 
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  codedeploy_dev:
    if: github.ref == 'refs/heads/multi_tenant_dev'
    uses: ./.github/workflows/codedeploy-dev.yml
    secrets: inherit

  release_dev:
    needs: [codedeploy_dev]
    if: github.ref == 'refs/heads/multi_tenant_dev'
    uses: ./.github/workflows/release-version.yml
    with:
      environment: CSMP_Dev
    secrets: inherit

  codedeploy_stage:
    if: github.ref == 'refs/heads/multi_tenant_stage'
    uses: ./.github/workflows/codedeploy-stage.yml
    secrets: inherit

  qa-automation:
    if: github.ref == 'refs/heads/multi_tenant_stage'
    needs: [codedeploy_stage]
    uses: ./.github/workflows/qa-automation.yml
    secrets: inherit

  codedeploy_rollback_stage:
    needs: [codedeploy_stage, qa-automation]
    if: ${{ needs.qa-automation.outputs.job_status == 'failure' && github.ref == 'refs/heads/multi_tenant_stage' }}
    uses: ./.github/workflows/codedeploy-stage.yml
    with:
      codedeploy_rollback: True
    secrets: inherit

  release_stage:
    needs: [codedeploy_stage, qa-automation]
    if: ${{ needs.qa-automation.outputs.job_status == 'success' && github.ref == 'refs/heads/multi_tenant_stage' }}
    uses: ./.github/workflows/release-version.yml
    with:
      environment: CSMP_Stage
    secrets: inherit
