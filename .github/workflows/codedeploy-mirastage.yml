name: node-api-mirastage-codedeploy

on:
  workflow_run:
    workflows: ["release-node-api-version"]
    branches:
      - multi_tenant_stage
    types:
      - completed

permissions:
  id-token: write 
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  codedeploy:
    name: Trigger codedeploy with latest commit to MIRA Stage
    runs-on: ubuntu-latest
    steps:
      - name: Echo Branch name
        run: |
          branch_name="${GITHUB_REF#refs/heads/}"
          echo $branch_name