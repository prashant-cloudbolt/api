name: qa-automation

on:
  workflow_run:
    workflows: ["release-dependent-codedeploy"]
    branches:
      - multi_tenant_stage
    types:
      - completed

permissions:
  id-token: write 
  contents: read
  pull-requests: write
  security-events: write
  actions: read

jobs:
  qa-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Run maven.yml workflow in qa-automation repository
        env:
          GITHUB_TOKEN:  ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run maven.yml \
          --repo prashant-cloudbolt/qa-automation

      - name: Watch maven.yml workflow run
        env:
          GITHUB_TOKEN:  ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow=maven.yml --repo prashant-cloudbolt/qa-automation --limit=1 --json databaseId --jq '.[0].databaseId')
          gh run watch $RUN_ID --repo prashant-cloudbolt/qa-automation \
          || exit 1  

