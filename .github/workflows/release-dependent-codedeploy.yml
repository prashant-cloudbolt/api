name: release-dependent-codedeploy

on:
  workflow_dispatch:
    inputs:
      codedeploy_rollback:
        description: "Trigger rollback in dependent workflow if value if True"
        required: false
      environment:
        description: "Environment to deploy"
        required: true
        type: string
      distinct_id:
        description: "This input required to run the workflow from return-dispatch"  

jobs:
  trigger-codedeploy-stage:
    if: ${{ github.event.inputs.environment == 'CSMP_Stage' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository:
          - node-api

    steps:
      - uses: actions/checkout@v4
        name: Checkout Repository

      - name: Print inputs
        run: |
          echo "Codedeploy rollback  is : ${{ inputs.codedeploy_rollback }}"
          echo "Environment is : ${{ inputs.environment }}"
      
      - name: Run ${{ matrix.repository }} release version workflow
        uses: codex-/return-dispatch@v1
        id: return_dispatch
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: multi_tenant_stage
          repo: ${{ matrix.repository }}
          owner: prashant-cloudbolt
          workflow: codedeploy-stage.yml
          workflow_inputs: '{ "codedeploy_rollback": "${{ inputs.codedeploy_rollback }}" }'

      - name: Watch ${{ matrix.repository }} release version workflow
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=${{ steps.return_dispatch.outputs.run_id }}
          gh run watch $RUN_ID --repo prashant-cloudbolt/${{ matrix.repository }}

      - name: Notify failure to Slack
        uses: act10ns/slack@v2.0.0
        if: ${{ failure() }} # This ensures the step runs only if the previous steps fail
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENT_NOTIFICATION_WEBHOOK }} 
        with:
          status: ${{ job.status }}
          message: |
            :rotating_light: *Urgent*: Release Dependent CodeDeploy Workflow Failed for API of CSMP-Stage Environment:rotating_light:
            Repository: ${{ github.repository }}
            Pipeline URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${{ github.event.inputs.distinct_id }}

  trigger-codedeploy-dev:
    if: ${{ github.event.inputs.environment == 'CSMP_Dev' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repository:
          - node-api

    steps:
      - uses: actions/checkout@v4
        name: Checkout Repository

      - name: Run ${{ matrix.repository }} release version workflow
        uses: codex-/return-dispatch@v1
        id: return_dispatch
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: multi_tenant_dev
          repo: ${{ matrix.repository }}
          owner: prashant-cloudbolt
          workflow: codedeploy-dev.yml

      - name: Watch ${{ matrix.repository }} release version workflow
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          RUN_ID=${{steps.return_dispatch.outputs.run_id}}
          gh run watch $RUN_ID --repo prashant-cloudbolt/${{ matrix.repository }}

      - name: Notify failure to Slack
        uses: act10ns/slack@v2.0.0
        if: ${{ failure() }} # This ensures the step runs only if the previous steps fail
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENT_NOTIFICATION_WEBHOOK }} 
        with:
          status: ${{ job.status }}
          message: |
            :rotating_light: *Urgent*: Release Dependent CodeDeploy Workflow Failed for API of CSMP-DEV Environment :rotating_light:
            Repository: ${{ github.repository }}
            Pipeline URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: echo distinct ID ${{ github.event.inputs.distinct_id }}
        run: echo ${{ github.event.inputs.distinct_id }}