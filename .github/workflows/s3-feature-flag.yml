name: Upload feature_flag.json to S3 with versioning

on: 
  workflow_call:
    inputs:
      environment:
        description: 'The environment to deploy the stack to.'
        default: ''
        required: false
        type: string
      stack-name:
        description: 'Name of the CloudFormation stack.'
        default: ''
        required: false
        type: string
      working-directory:
        description: 'The working directory to run the action in.'
        default: ''
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  deployments: write

defaults:
  run:
    shell: bash -leo pipefail {0}

jobs:
  s3-feature-flag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetch the last 2 commits for comparison

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETS_KEY }}
          aws-region: us-east-1

      - name: Convert environment to lowercase
        id: lowercase-env
        run: |
          echo "environment=$(echo '${{ inputs.environment }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Check if S3 bucket exists
        id: check-bucket
        run: |
            BUCKET_NAME="github-feature-flag-json-s3-${{ env.environment }}-12345"
            echo "Checking for bucket: $BUCKET_NAME"
            if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
                echo "bucket_exists=true" >> $GITHUB_OUTPUT
            else
                echo "bucket_exists=false" >> $GITHUB_OUTPUT
            fi

      - name: Deploy S3 bucket for feature flag Template
        if: steps.check-bucket.outputs.bucket_exists == 'false'
        working-directory: ${{ inputs.working-directory }}
        run: |
            aws cloudformation deploy \
                --template-file s3-feature-flag-template.yaml \
                --stack-name ${{ inputs.stack-name }}-s3-feature-flag \
                --parameter-overrides \
                    Environment=${{ env.environment }} \
                --capabilities CAPABILITY_NAMED_IAM

      - name: Check if feature_flag.json has been modified
        id: check-modified
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}
          if git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD | grep -q "feature_flag.json"; then
            echo "featureflag_modified=true" >> $GITHUB_ENV
          else
            echo "featureflag_modified=false" >> $GITHUB_ENV
          fi

      - name: Output result
        run: |
          echo "Feature flag modified: ${{ env.featureflag_modified }}"

      - name: Fetch the latest version of feature_flag.json from S3
        if: env.featureflag_modified == 'true'
        id: get-latest-version
        run: |
          BUCKET_NAME="github-feature-flag-json-s3-${{ env.environment }}-12345"
          
          # List all versions in the bucket and sort by version number
          LATEST_VERSION=$(aws s3 ls s3://$BUCKET_NAME/ | grep feature_flag_v | sort | tail -n 1 | awk '{print $4}')
          echo "Latest version of feature_flag.json: $LATEST_VERSION"
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Determine next version
        if: env.featureflag_modified == 'true'
        id: version-increment
        run: |
          # Get the current version number (v0.0.1, v0.0.2, etc.)
          CURRENT_VERSION=$(echo "${{ env.latest_version }}" | grep -o 'v[0-9]*\.[0-9]*\.[0-9]*')
          if [ -z "$CURRENT_VERSION" ]; then
            # If no version exists, start with v0.0.1
            NEXT_VERSION="v0.0.1"
          else
            # Increment the patch number by 1 (v0.0.1 -> v0.0.2)
            NEXT_VERSION=$(echo "$CURRENT_VERSION" | awk -F. '{print $1 "." $2 "." $3+1}')
          fi
          echo "Next version: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Upload new feature_flag.json to S3 with versioning
        run: |
          BUCKET_NAME="github-feature-flag-json-s3-${{ env.environment }}-12345"
          NEXT_VERSION_FILE="feature_flag_${{ env.next_version }}.json"
          
          # Copy the feature_flag.json file to S3 with the new version
          aws s3 cp services/feature_flag/feature_flag.json s3://$BUCKET_NAME/$NEXT_VERSION_FILE
          
          echo "Uploaded feature_flag.json as $NEXT_VERSION_FILE"