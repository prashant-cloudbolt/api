name: Build and Deploy

on:
  push:
    branches:
      - multi_tenant_dev
      - multi_tenant_stage

permissions:
  id-token: write 
  contents: read
  pull-requests: write
  security-events: write
  actions: read


jobs:
  codedeploy_dev:
    name: Trigger codedeploy to Dev Ohio
    if: github.ref == 'refs/heads/multi_tenant_dev'
    uses: .github/workflows/codedeploy-dev.yml

  codedeploy_stage:
    name: Trigger codedeploy to Dev Ohio
    if: github.ref == 'refs/heads/multi_tenant_stage'
    uses: .github/workflows/codedeploy-stage.yml
